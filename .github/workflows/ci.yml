name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test

      - name: Dependency audit
        run: pnpm audit --audit-level high

      - name: Deno Edge Function checks
        run: |
          (cd supabase/functions/ai-clarify && deno check --no-lock --node-modules-dir=auto index.ts)
          (cd supabase/functions/ai-plan && deno check --no-lock --node-modules-dir=auto index.ts)
          (cd supabase/functions/ai-weekly-review && deno check --no-lock --node-modules-dir=auto index.ts)
          (cd supabase/functions/rag-answer && deno check --no-lock --node-modules-dir=auto index.ts)
          (cd supabase/functions/embed-knowledge-document && deno check --no-lock --node-modules-dir=auto index.ts)
          (cd supabase/functions/health && deno check --no-lock --node-modules-dir=auto index.ts)

      - name: SQL/RLS policy audit
        run: |
          mkdir -p output/ci-audit
          log="output/ci-audit/sql-rls-policy-audit.log"
          {
            echo "SQL/RLS policy audit"
            echo "checked_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "Migrations:"
            ls supabase/migrations/*.sql
            echo
            echo "RLS enablement:"
            grep -RIn "enable row level security" supabase/migrations
            echo
            echo "Knowledge RAG policies and RPC:"
            grep -RInE "knowledge_documents|knowledge_chunks|knowledge_answers|match_knowledge_chunks|auth.uid\\(\\)" supabase/migrations
          } > "$log"
          grep -Riq "enable row level security" supabase/migrations
          grep -Riq "match_knowledge_chunks" supabase/migrations
          grep -Riq "knowledge_chunks" supabase/migrations
          grep -Riq "auth.uid()" supabase/migrations
          cat "$log"

      - name: Upload SQL/RLS policy audit
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: sql-rls-policy-audit
          path: output/ci-audit/sql-rls-policy-audit.log

      - name: Build
        run: pnpm run build

      - name: E2E tests
        env:
          E2E_DEMO_EMAIL: ${{ secrets.E2E_DEMO_EMAIL }}
          E2E_DEMO_PASSWORD: ${{ secrets.E2E_DEMO_PASSWORD }}
        run: pnpm run test:e2e

      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-evidence
          path: output/playwright

  vercel-frontend-deploy:
    name: Vercel frontend deploy
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.VERCEL_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel production environment
        run: pnpm dlx vercel@54.14.0 pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build Vercel artifact
        run: pnpm dlx vercel@54.14.0 build --prod --token "$VERCEL_TOKEN"

      - name: Deploy Vercel production artifact
        run: |
          deployment_url="$(pnpm dlx vercel@54.14.0 deploy --prebuilt --prod --token "$VERCEL_TOKEN")"
          {
            echo "$deployment_url"
            echo "https://focustrack-ai.vercel.app"
          } > vercel-deploy-url.txt

      - name: Upload Vercel deploy URL
        uses: actions/upload-artifact@v5
        with:
          name: vercel-deploy-url
          path: vercel-deploy-url.txt

  supabase-deploy:
    name: Supabase deploy
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.SUPABASE_DEPLOY_ENABLED != 'false'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID || vars.SUPABASE_PROJECT_ID || 'wbxyyvvuqrhqtuywfeto' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify Supabase deploy credentials
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN GitHub secret is required for Supabase deploy." >&2
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "SUPABASE_PROJECT_ID GitHub secret or variable is required for Supabase deploy." >&2
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push database migrations
        run: supabase db push --yes

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy ai-clarify
          supabase functions deploy ai-plan
          supabase functions deploy ai-weekly-review
          supabase functions deploy rag-answer
          supabase functions deploy embed-knowledge-document
          supabase functions deploy health
